name: api-endpoint
description: "Build a REST API endpoint with CRUD operations"
request: "Build a REST API with Python Flask that provides CRUD endpoints for a 'notes' resource. Each note has an id, title, and content. Use in-memory storage. Include proper HTTP status codes."
runs: 3
verify_command: none
assertions:
  - type: file_exists
    path: "*.py"
  - type: pattern_match
    path: "*.py"
    pattern: "flask|Flask"
  - type: pattern_match
    path: "*.py"
    pattern: "GET|POST|PUT|DELETE"
  - type: file_exists
    path: "requirements.txt"
configs:
  - name: all-opus
    model_overrides:
      conductor: anthropic/claude-opus-4-5-20251101
      architect: anthropic/claude-opus-4-5-20251101
      designer: anthropic/claude-opus-4-5-20251101
      developer: anthropic/claude-opus-4-5-20251101
  - name: all-sonnet
    model_overrides:
      conductor: anthropic/claude-sonnet-4-5-20250929
      architect: anthropic/claude-sonnet-4-5-20250929
      designer: anthropic/claude-sonnet-4-5-20250929
      developer: anthropic/claude-sonnet-4-5-20250929
  - name: heterogeneous
  - name: adaptive-3tier
    adaptive: true
