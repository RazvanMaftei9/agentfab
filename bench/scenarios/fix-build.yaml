name: fix-build
description: "Fix a broken build in a simple Node.js project"
request: "Create a simple Node.js Express API server with a /health endpoint that returns JSON {\"status\": \"ok\"}. Include a package.json with a start script."
runs: 3
assertions:
  - type: file_exists
    path: "package.json"
  - type: file_exists
    path: "*.js"
  - type: pattern_match
    path: "package.json"
    pattern: "\"start\""
  - type: pattern_match
    path: "*.js"
    pattern: "express|http"
configs:
  - name: all-opus
    model_overrides:
      conductor: anthropic/claude-opus-4-5-20251101
      architect: anthropic/claude-opus-4-5-20251101
      designer: anthropic/claude-opus-4-5-20251101
      developer: anthropic/claude-opus-4-5-20251101
  - name: all-sonnet
    model_overrides:
      conductor: anthropic/claude-sonnet-4-5-20250929
      architect: anthropic/claude-sonnet-4-5-20250929
      designer: anthropic/claude-sonnet-4-5-20250929
      developer: anthropic/claude-sonnet-4-5-20250929
  - name: heterogeneous
  - name: adaptive-3tier
    adaptive: true
