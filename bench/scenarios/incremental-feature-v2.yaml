name: incremental-feature-v2
description: "Knowledge persistence test (phase 2): Add search, categories, and markdown to existing note app."
category: ablation
complexity: medium
request: |
  Extend the existing note-taking application with these features:
  - Search: Add GET /api/notes/search?q=<query> endpoint that searches title and content
    (case-insensitive). Add a search bar to the frontend.
  - Categories: Notes now have a 'category' field. Add:
    - GET /api/categories - list distinct categories
    - Filter notes by category in the sidebar
    - Category selector when creating/editing notes
  - Markdown support: Render note content as Markdown in the detail view.
    Use a CDN-hosted markdown library (e.g., marked.js).
  - Export: Add GET /api/notes/export endpoint that returns all notes as a downloadable JSON file.
    Add an "Export All" button in the UI.
  - Updated styling: Add a sidebar showing categories with note counts.
    Highlight the active category.
runs: 3
assertions:
  - type: file_exists
    path: "server.js"
  - type: file_exists
    path: "*.html"
  - type: pattern_match
    path: "server.js"
    pattern: "search|category|categories"
  - type: pattern_match
    path: "server.js"
    pattern: "export"
  - type: pattern_match
    path: "*.html"
    pattern: "marked|markdown"
  - type: pattern_match
    path: "*.js"
    pattern: "search|filter"
configs:
  - name: all-opus
    model_overrides:
      conductor: anthropic/claude-opus-4-5-20251101
      architect: anthropic/claude-opus-4-5-20251101
      designer: anthropic/claude-opus-4-5-20251101
      developer: anthropic/claude-opus-4-5-20251101
  - name: all-sonnet
    model_overrides:
      conductor: anthropic/claude-sonnet-4-5-20250929
      architect: anthropic/claude-sonnet-4-5-20250929
      designer: anthropic/claude-sonnet-4-5-20250929
      developer: anthropic/claude-sonnet-4-5-20250929
  - name: heterogeneous
  - name: single-agent
    single_agent: true
  - name: no-verify
    disable_verify: true
  - name: adaptive-3tier
    adaptive: true
