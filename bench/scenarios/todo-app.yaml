name: todo-app
description: "Build a simple todo application with add/delete/complete"
request: "Build a todo application with HTML, CSS, and JavaScript. Include add, delete, and mark-complete functionality."
runs: 3
verify_command: none
assertions:
  - type: file_exists
    path: "index.html"
  - type: file_exists
    path: "*.css"
  - type: pattern_match
    path: "*.js"
    pattern: "addEventListener"
  - type: file_count_min
    path: "*.html"
    min: 1
configs:
  - name: all-opus
    model_overrides:
      conductor: anthropic/claude-opus-4-5-20251101
      architect: anthropic/claude-opus-4-5-20251101
      designer: anthropic/claude-opus-4-5-20251101
      developer: anthropic/claude-opus-4-5-20251101
  - name: all-sonnet
    model_overrides:
      conductor: anthropic/claude-sonnet-4-5-20250929
      architect: anthropic/claude-sonnet-4-5-20250929
      designer: anthropic/claude-sonnet-4-5-20250929
      developer: anthropic/claude-sonnet-4-5-20250929
  - name: heterogeneous
    # Uses defaults from agents.yaml (the current setup)
  - name: no-verify
    disable_verify: true
