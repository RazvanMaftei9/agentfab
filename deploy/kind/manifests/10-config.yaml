apiVersion: v1
kind: ConfigMap
metadata:
  name: agentfab-fabric
  namespace: agentfab
data:
  # Minimal fabric definition for the kind test. Agent definitions live
  # inside the image at /opt/agentfab/agents and are loaded via
  # `agents_dir`.
  agents.yaml: |
    fabric:
      name: agentfab-k8s
      version: 1
    agents_dir: /opt/agentfab/agents
    storage:
      shared_root: /mnt/agentfab/shared
      agent_root: /mnt/agentfab/agents
      scratch_root: /tmp/agentfab-scratch
    control_plane:
      backend: etcd
      api:
        address: control-plane.agentfab.svc.cluster.local:50051
        listen_address: "0.0.0.0:50051"
      etcd:
        endpoints:
          - http://etcd.agentfab.svc.cluster.local:2379
        dial_timeout: 5s
    providers:
      anthropic:
        api_key_env: ANTHROPIC_API_KEY
      openai:
        api_key_env: OPENAI_API_KEY
      gemini:
        api_key_env: GEMINI_API_KEY
