apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: agentfab
  labels:
    app.kubernetes.io/name: agentfab
    app.kubernetes.io/component: etcd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentfab
    app.kubernetes.io/component: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
      protocol: TCP
    - name: peer
      port: 2380
      targetPort: 2380
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: agentfab
  labels:
    app.kubernetes.io/name: agentfab
    app.kubernetes.io/component: etcd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agentfab
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentfab
        app.kubernetes.io/component: etcd
    spec:
      containers:
        - name: etcd
          image: registry.k8s.io/etcd:3.5.21-0
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/etcd
          args:
            - --name=agentfab-kind-etcd
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd.agentfab.svc.cluster.local:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://etcd.agentfab.svc.cluster.local:2380
            - --initial-cluster=agentfab-kind-etcd=http://etcd.agentfab.svc.cluster.local:2380
            - --initial-cluster-state=new
          ports:
            - name: client
              containerPort: 2379
              protocol: TCP
            - name: peer
              containerPort: 2380
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: data
          hostPath:
            path: /var/lib/agentfab-host/etcd
            type: DirectoryOrCreate
