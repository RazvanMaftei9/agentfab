apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentfab-node
  namespace: agentfab
  labels:
    app.kubernetes.io/name: agentfab
    app.kubernetes.io/component: node
spec:
  # Twelve node hosts so the demo can fan out 30+ parallel tasks across
  # distinct instances. Tighten back down to 2 if you only need a smoke test.
  replicas: 12
  selector:
    matchLabels:
      app.kubernetes.io/name: agentfab
      app.kubernetes.io/component: node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentfab
        app.kubernetes.io/component: node
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      # Spread the two replicas across distinct kind workers if possible.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agentfab
              app.kubernetes.io/component: node
      initContainers:
        - name: seed-ca
          image: agentfab:dev
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              dest=/var/lib/agentfab/shared/identity/local-dev
              mkdir -p "$dest"
              cp /etc/agentfab-ca/ca.pem "$dest/ca.pem"
              cp /etc/agentfab-ca/ca-key.pem "$dest/ca-key.pem"
              chmod 600 "$dest"/*.pem
          volumeMounts:
            - name: data
              mountPath: /var/lib/agentfab
            - name: cluster-ca
              mountPath: /etc/agentfab-ca
              readOnly: true
      containers:
        - name: node
          image: agentfab:dev
          imagePullPolicy: IfNotPresent
          # The node uses its Pod IP as the advertise host so the cert it
          # issues for itself contains the IP SAN that the conductor will
          # connect to. agent gRPC listeners bind a random port; the node
          # registers each (PodIP, port) pair with the control plane.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              exec /usr/local/bin/agentfab node serve \
                --config /etc/agentfab/agents.yaml \
                --data-dir /var/lib/agentfab \
                --node-id "${POD_NAME}" \
                --listen-host 0.0.0.0 \
                --advertise-host "${POD_IP}" \
                --enrollment-token-file /etc/agentfab-token/token \
                --labels "kind.node=${NODE_NAME}" \
                --max-tasks 10 \
                --max-instances 10
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - secretRef:
                name: agentfab-llm
                optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: fabric
              mountPath: /etc/agentfab/agents.yaml
              subPath: agents.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/agentfab
            - name: fabric-storage
              mountPath: /mnt/agentfab
            - name: enrollment-token
              mountPath: /etc/agentfab-token
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: fabric
          configMap:
            name: agentfab-fabric
        - name: cluster-ca
          secret:
            secretName: agentfab-cluster-ca
            defaultMode: 0400
        - name: enrollment-token
          secret:
            secretName: agentfab-node-token
            defaultMode: 0400
        - name: fabric-storage
          hostPath:
            path: /var/lib/agentfab-host/fabric
            type: DirectoryOrCreate
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
